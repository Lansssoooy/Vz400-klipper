#######################
####### STEPPERS #######
#######################

[stepper_x]
## in M3 position
step_pin: PE15
dir_pin: PE11
enable_pin: !PF2
rotation_distance: 40
microsteps: 16
full_steps_per_rotation: 200  # set to 400 for 0.9 degree stepper
endstop_pin: sht:gpio16
position_endstop: 0
position_min: -1
position_max: 360             # VERIFY — was corrupted as ';60'
homing_speed: 80
homing_retract_dist: 0

[tmc5160 stepper_x]
#spi_bus: spi1a
#cs_pin: PG5
cs_pin: PE10
interpolate: true
run_current: 2.3              # was 'ruf_current'
sense_resistor: 0.022         # was merged onto previous line (missing newline), caused the original error
spi_software_mosi_pin: PB5
spi_software_miso_pin: PB4
spi_software_sclk_pin: PB3
stealthchop_threshold: 0

[stepper_y]
## in M4 position
step_pin: PE14
dir_pin: PE8
enable_pin: !PE9
rotation_distance: 40         # was 'rotation}distance'
microsteps: 16
full_steps_per_rotation: 200  # set to 400 for 0.9 degree stepper
endstop_pin: PG9
position_endstop: 395 
homing_positive_dir: true
position_min: -10             # was 'xosition_min'
position_max: 396
homing_speed: 80              # was 'homing_sxeed'
homing_retract_dist: 0

[tmc5160 stepper_y]
#spi_bus: spi1a
cs_pin: PE7
interpolate: true
run_current: 2.3
sense_resistor: 0.022         # was 'sense_resisvor'
spi_software_mosi_pin: PB5
spi_software_miso_pin: PB4   # was 'spi_software_mIso_pin'
spi_software_sclk_pin: PB3
stealthchop_threshold: 0

[stepper_z]
## in M0 position
step_pin: PE4
dir_pin: !PG0
enable_pin: !PG1
microsteps: 32
rotation_distance: 4
endstop_pin: probe:z_virtual_endstop  # was 'z_virtual_enfstop'
#position_endstop: 0.0
position_min: -35
position_max: 430
full_steps_per_rotation: 200  # VERIFY — was '208', almost certainly corruption of '200'
homing_retract_dist: 5.0      # was 'homing_retractdist'
homing_positive_dir: false    # was 'dalse'
homing_speed: 5.0             # was 'homing_spemd: =.0' — VERIFY this value
second_homing_speed: 2.5

[tmc2209 stepper_z]           # was '[toc2209 stepper_z]'
interpolate: false            # was 'interpolatm'
uart_pin: PF15
run_current: 1.2
sense_resistor: 0.110

#######################
## AUTOTUNE / MOTORS ###
#######################

[autotune_tmc stepper_x]
motor: 42BYGHW811-X1          # was '<2BYGHW811-X1'
voltage: 48

[autotune_tmc stepper_y]
motor: 42BYGHW811-X1
voltage: 48

[motor_constants 42BYGHW811-X1]
# Coil resistance, Ohms (1.25Ω ±10%)
resistance: 1.25
# Coil inductance, Henries (1.8mH ±20%)
inductance: 0.0018
# Holding torque, Nm (48N.cm = 0.48Nm)
holding_torque: 0.48
# Nominal rated current, Amps (2.5A per phase)
max_current: 2.5              # was 'mix_current'
# Steps per revolution (1.8° per step = 200 steps per rev)
steps_per_revolution: 200