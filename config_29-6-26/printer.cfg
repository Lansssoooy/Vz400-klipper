########################
# MATERIAL-SPECIFIC MACROS
########################

[gcode_macro M600]
description: Filament change procedure
gcode:
    {% set X = params.X|default(50)|float %}
    {% set Y = params.Y|default(10)|float %}
    {% set Z = params.Z|default(10)|float %}
    
    SAVE_GCODE_STATE NAME=M600_state
    PAUSE
    
    # Move to filament change position
    G91
    G1 E-5 F2100  # Retract
    G1 Z{Z} F600
    G90
    G1 X{X} Y{Y} F3000
    
    # Unload filament
    G91
    G1 E-50 F1000
    G90
    
    RESPOND MSG="Filament change - remove old filament and insert new"
    M117 Change Filament
    
    # Wait for user to resume
    # User should click Resume in interface after loading new filament

[gcode_macro PRINT_START_ABS]
description: Print start for ABS material
gcode:
    {% set BED = params.BED|default(100)|float %}
    {% set EXTRUDER = params.EXTRUDER|default(245)|float %}
    
    PRINT_START BED_TEMP={BED} EXTRUDER_TEMP={EXTRUDER} MATERIAL=ABS
    # Switch to ABS-specific settings
    SET_PRESSURE_ADVANCE ADVANCE=0.04
    SET_PRESSURE_ADVANCE SMOOTH_TIME=0.040
    BED_MESH_PROFILE LOAD=abs

[gcode_macro PRINT_START_PETG]
description: Print start for PETG material
gcode:
    {% set BED = params.BED|default(80)|float %}
    {% set EXTRUDER = params.EXTRUDER|default(240)|float %}
    
    PRINT_START BED_TEMP={BED} EXTRUDER_TEMP={EXTRUDER} MATERIAL=PETG
    # Switch to PETG-specific settings
    SET_PRESSURE_ADVANCE ADVANCE=0.055
    SET_PRESSURE_ADVANCE SMOOTH_TIME=0.040
    BED_MESH_PROFILE LOAD=default

