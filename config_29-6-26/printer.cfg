# ======================================================================

[servo Euclid_servo]
pin: PC6
initial_angle: 10
maximum_servo_angle: 180
minimum_pulse_width: 0.0005
maximum_pulse_width: 0.0024

[force_move]
enable_force_move: True

[respond]
default_type: echo
default_prefix: echo:
