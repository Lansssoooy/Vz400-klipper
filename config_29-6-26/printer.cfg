[include Steppers.cfg]

########################

[shaketune]
[skew_correction]
[exclude_object]
[display_status]

########################
[dynamicmacros]
configs: macros.cfg
########################

[virtual_sdcard]
path: /home/Vz400/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[mcu]
#serial: usb-Klipper_stm32h723xx_1A0040000451323336333538-if00
canbus_uuid:8ec5db5a08e1

[mcu sht]
canbus_uuid:b91d50640ed6
canbus_interface: can0

[mcu rpi]
serial: /tmp/klipper_host_mcu

[input_shaper]
shaper_freq_x: 105.2
shaper_freq_y: 73.8
shaper_type: ei

[lis2dw my_lis2dw]
cs_pin: sht:gpio12
spi_bus: spi0_gpio4_gpio3_gpio2

[adxl345 my_adxl345]
cs_pin: rpi:None

[resonance_tester]
accel_chip: lis2dw my_lis2dw
# OR
accel_chip: adxl345 my_adxl345
max_freq: 150
accel_per_hz: 120
probe_points:
    180, 195, 50

[printer]
kinematics: corexy
max_velocity: 300
max_accel: 40000
max_z_velocity: 15
max_z_accel: 10000
square_corner_velocity: 5

[bed_mesh]
speed: 300
horizontal_move_z: 15
mesh_min: 40, 68
mesh_max: 327, 340
probe_count: 4, 4          # was 3,3 — bicubic needs minimum 4 per axis
mesh_pps: 2, 2
algorithm: bicubic
bicubic_tension: 0.2
fade_start: 1
fade_end: 10
zero_reference_position: 180, 195

[probe]
pin: ^sht:gpio20         # ← carat enables pull-up
x_offset: 0
y_offset: 30
speed: 1
samples: 5
samples_result: median
sample_retract_dist: 2
samples_tolerance: 0.06
samples_tolerance_retries: 10
lift_speed: 5

########################
########################

[extruder]
## In M1 position
### Vz-HextrudORT
step_pin: sht:gpio7
dir_pin: !sht:gpio6
enable_pin: !sht:gpio14
microsteps: 16
rotation_distance: 22 
gear_ratio: 50:10 
nozzle_diameter: 0.4
filament_diameter: 1.750
heater_pin: sht:gpio23
pwm_cycle_time: 0.0167
sensor_type: MAX31865
sensor_pin: sht:gpio17
spi_bus:spi0_gpio4_gpio3_gpio2
rtd_reference_r: 4300    # PT1000 = 4300, PT100 = 430
rtd_nominal_r: 1000      # PT1000 = 1000, PT100 = 100
min_extrude_temp: 200
min_temp: 0
max_temp: 400
smooth_time: 0.5
full_steps_per_rotation: 200
max_extrude_only_distance: 1000.0
max_extrude_cross_section: 500
max_extrude_only_velocity: 200
max_extrude_only_accel: 1000
pressure_advance: 0.028
pressure_advance_smooth_time: 0.04

[verify_heater extruder]
max_error: 120  # FIXED: Was 999 (unsafe!)
check_gain_time: 30  # FIXED: Was 300 (too long!)
hysteresis: 5
heating_gain: 2  # FIXED: Was 0.1 (way too low!)

[firmware_retraction]
retract_length: 0.4
retract_speed: 60
unretract_extra_length: 0
unretract_speed: 60

[tmc2209 extruder]
interpolate: false
uart_pin: sht:gpio15
run_current: 0.65
sense_resistor: 0.110
stealthchop_threshold: 0  # Disable stealthchop for more accurate extrusion

[extruder_stepper pusher]
#   The extruder this stepper is synchronized to. If this is set to an
#   empty string then the stepper will not be synchronized to an
#   extruder. This parameter must be provided.
extruder: extruder
step_pin: PE3
dir_pin: !PF13
enable_pin: !PF14
microsteps: 16
rotation_distance: 5.8596
pressure_advance: 0.03
#   See the "stepper" section for the definition of the above
#   parameters.

[tmc2209 extruder_stepper pusher]
interpolate: false
uart_pin: PF12
run_current: 0.9
stealthchop_threshold: 0
sense_resistor: 0.110

[belay my_belay]
extruder_type: extruder_stepper
extruder_stepper_name: pusher
sensor_pin: ^PG12
multiplier_high: 1.02
multiplier_low: 0.98
debug_level: 1

