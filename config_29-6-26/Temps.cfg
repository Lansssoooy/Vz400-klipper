#################
#################

[temperature_sensor Enclosure]
sensor_type: BME280
i2c_mcu: rpi
i2c_bus: i2c.1
i2c_address: 119 
#i2c_software_scl_pin: rpi:gpio5
#i2c_software_sda_pin: rpi:gpio3
i2c_speed: 100000
gcode_id: ENV
min_temp: 0.0
max_temp: 80.0

[gcode_macro AIR_QUALITY]
variable_air_quality: 0
gcode:
    {% set air_quality = printer["gcode_macro AIR_QUALITY"].air_quality %}
    M118 AIR_QUALITY: {air_quality}

[temperature_sensor stepper_z]  optional for chamber temp
sensor_type: Generic 3950
pullup_resistor: 4700
sensor_pin: PF10
min_temp: 0
max_temp: 80
gcode_id: C: C

[temperature_sensor stepper_x]
sensor_type: Generic 3950
pullup_resistor: 4700
sensor_pin: PF5
min_temp: 0
max_temp: 130

[temperature_sensor stepper_y]
sensor_type: Generic 3950
pullup_resistor: 4700
sensor_pin: PF4
min_temp: 0
max_temp: 130

[temperature_sensor MCU_raspberry_pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[temperature_sensor MCU_Canbus]
sensor_type: temperature_mcu
sensor_mcu: sht

[temperature_sensor MCU_Super8]
sensor_type: temperature_mcu
sensor_mcu: mcu