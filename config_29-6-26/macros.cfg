[gcode_macro SET_SENSOR_STATE]
description: "Enable or disable filament/clog sensors"
variable_state: True
gcode:
    {% if params.STATE|lower == "off" %}
        SET_GCODE_VARIABLE MACRO=SET_SENSOR_STATE VARIABLE=state VALUE=False
        PRINT MSG="Filament and clog sensors disabled"
    {% else %}
        SET_GCODE_VARIABLE MACRO=SET_SENSOR_STATE VARIABLE=state VALUE=True
        PRINT MSG="Filament and clog sensors enabled"
    {% endif %}

[gcode_macro SET_PUSHER_ROTATION]
description: "Adjusts the pusher stepper's extrusion multiplier"
variable_factor: 1.0
gcode:
  {% set new_factor = params.FACTOR|float %}
  SET_GCODE_VARIABLE MACRO=SET_PUSHER_ROTATION VARIABLE=factor VALUE={new_factor}
  M118 Pusher stepper multiplier set to {new_factor}

[gcode_macro ENABLE_STEPPERS]
description: Manually enable all stepper motors
gcode:
    SET_STEPPER_ENABLE STEPPER=stepper_x ENABLE=1
    SET_STEPPER_ENABLE STEPPER=stepper_x1 ENABLE=1
    SET_STEPPER_ENABLE STEPPER=stepper_y ENABLE=1
    SET_STEPPER_ENABLE STEPPER=stepper_y1 ENABLE=1
    SET_STEPPER_ENABLE STEPPER=stepper_z ENABLE=1
    SET_STEPPER_ENABLE STEPPER=stepper_z1 ENABLE=1
    SET_STEPPER_ENABLE STEPPER=stepper_z2 ENABLE=1
    SET_STEPPER_ENABLE STEPPER=stepper_z3 ENABLE=1
    RESPOND MSG="All steppers enabled"

[gcode_macro MOTORS_OFF]
description: Disable all motors
gcode:
    M84
    RESPOND MSG="All motors disabled"

[gcode_macro Stepper_Buzz_Cycle]
description: "Smooth circular toolhead motion"
variable_LOOPS: 3  ; Default loop count
gcode:
    G91  ; Set to relative positioning (incremental moves)

    ; Set high speed & acceleration
    M204 S7000  ; Set acceleration to 10,000 mm/s²
    G1 F6000  ; Set feedrate to 200mm/s

    ; Circular movement with Z oscillation
    G1 X50 Y25 Z2
    G1 X50 Y-25 Z-2
    G1 X25 Y-50 Z2
    G1 X-25 Y-50 Z-2
    G1 X-50 Y-25 Z2
    G1 X-50 Y25 Z-2
    G1 X-25 Y50 Z2
    G1 X25 Y50 Z-2

    ; Repeat to form a continuous circular motion
    G1 X50 Y25 Z2
    G1 X50 Y-25 Z-2
    G1 X25 Y-50 Z2
    G1 X-25 Y-50 Z-2
    G1 X-50 Y-25 Z2
    G1 X-50 Y25 Z-2
    G1 X-25 Y50 Z2
    G1 X25 Y50 Z-2

    G90  ; Restore absolute positioning
    M400  ; Wait for all moves to finish
    
[neopixel sb_leds]
pin: sht:gpio26
chain_count: 3
color_order: GRB
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 0.0
initial_WHITE: 0.0

[multi_pin Enclosure_Light]
pins: PA0, PD14

[led Enclosure_Light]
white_pin: multi_pin:Enclosure_Light
cycle_time: 0.010
hardware_pwm: false
initial_WHITE: 0.0

