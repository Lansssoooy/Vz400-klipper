#################################
# PAUSE/RESUME - FIXED LOGIC
#################################

[pause_resume]
recover_velocity: 50

[gcode_macro PAUSE_OVERRIDE]
description: Custom PAUSE that prevents out-of-range errors and moves nozzle safely
gcode:
    {% set max_x = printer.toolhead.axis_maximum.x|float %}
    {% set max_y = printer.toolhead.axis_maximum.y|float %}
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set current_z = printer.toolhead.position.z|float %}
    
    # Safe park position with proper margins
    {% set safe_x = [max_x - 10, 50.0]|min %}
    {% set safe_y = [max_y - 10, 50.0]|min %}
    {% set lift_z = [current_z + 10, max_z - 5]|min %}
    
    RESPOND MSG="Pausing print... Moving to safe position."
    
    M83                          ; Relative extrusion mode
    G1 E-2.0 F2100              ; Retract to prevent oozing
    G91                          ; Relative positioning
    G1 Z5.0 F900                ; Lift Z to avoid dragging
    G90                          ; Absolute positioning
    
    ; Move nozzle to safe position
    G1 X{safe_x} Y{safe_y} F3000
    G1 Z{lift_z} F900
    
    M400                         ; Wait for moves to finish
    RESPOND MSG="Print Paused. Resume with RESUME_OVERRIDE."

[gcode_macro RESUME_OVERRIDE]
description: Custom RESUME that moves back safely
gcode:
    RESPOND MSG="Resuming print..."
    
    G91                          ; Relative positioning
    G1 Z-5.0 F900               ; Lower back down
    G90                          ; Absolute positioning
    M83                          ; Relative extrusion mode
    G1 E2.0 F2100               ; Unretract filament
    
    RESPOND MSG="Print Resumed."
    RESUME

##########################################################################################
#                  MACROS BELOW ARE USE FOR PRINTING FUNCTIONALITY
##########################################################################################

[gcode_macro PRINT_START]
description: Prepare the printer before starting a print
gcode:
    # Home if not already homed
    {% if "xyz" not in printer.toolhead.homed_axes %}
        RESPOND MSG="Homing..."
        G28 RESET_SETTINGS={params.RESET_SETTINGS|default('true')}
    {% endif %}

    ###### Get temperatures from slicer
    ###ABS 0.4
    #{% set BED_TEMP = params.BED_TEMP|default(100)|float %}
    #{% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(250)|float %}
    ###PETG 0.4
    #{% set BED_TEMP = params.BED_TEMP|default(80)|float %}
    #{% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(250)|float %}
    ###PETG 0.6
    {% set BED_TEMP = params.BED_TEMP|default(80)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(250)|float %}

    # Preheat nozzle and bed
    M104 S{EXTRUDER_TEMP}                     
    M140 S{BED_TEMP}   

    # Filament information
    {% set COLOR = params.FILAMENT_COLOUR|default("XXX")|string %}
    RESPOND MSG="Selected Print Color: {COLOR}"

    # Slicer parameters
    {% set PRINT_MIN = params.PRINT_MIN|default(0)|float %}
    {% set PRINT_MAX = params.PRINT_MAX|default(0)|float %}
    {% set MATERIAL = params.MATERIAL|default("XXX")|string %}
    {% set INITIAL_EXTRUDER = params.INITIAL_EXTRUDER|default(0)|float %}

    # Get printer configuration values
    {% set X_MID = printer.configfile.config["stepper_x"]["position_max"]|float / 2.0 %}
    {% set Y_MID = printer.configfile.config["stepper_y"]["position_max"]|float / 2.0 %}
    
    # Wait for temperatures to reach targets
    RESPOND MSG="Waiting for temperature"
    M190 S{BED_TEMP}           ; Wait for bed temp
    M109 S{EXTRUDER_TEMP}      ; Wait for nozzle temp

    # Ensure XY homed before continuing
    {% if "xy" not in printer.toolhead.homed_axes %}
        G28 XY
    {% endif %}

    # Load saved bed mesh profile
    ##PETG
    BED_MESH_PROFILE LOAD=default
    ##ABS
    #BED_MESH_PROFILE LOAD=abs

    # Load skew profile
    SKEW_PROFILE LOAD=my_skew_profile

    # Always detach probe before printing (homing attaches it)
    RESPOND MSG="Detaching probe..."
    Detach_Probe
    
    RESPOND MSG="Starting Print Sequence..."
    
    # Temporarily disable sensors
    SET_SENSOR_STATE STATE=off

    # Prime Line
    RESPOND MSG="Prime Line..."
    PRIME_LINE

    # Wait 3 seconds before enabling sensors
    G4 P3000
    SET_SENSOR_STATE STATE=on

    # Proceed with the rest of the startup sequence
    RESPOND MSG="Print starting!"

[gcode_macro PRIME_LINE]
gcode:
    {% set retract = 10 %}
    G90                           ; Absolute positioning
    G1 Y10 X120 Z5 F20000         ; Move the nozzle to the front and near the bed
    G1 Z0.7 F300                 ; Move the nozzle very close to the bed
    G92 E0.0                     ; Set extruder position to 0
    G1 E{retract} F3600          ; Extrude retract
    G92 E0.0                     ; Set extruder position to 0
    G1 X220 E15.0 F7000          ; Intro line (slower for reliability)
    G92 E0.0                     ; Set extruder position to 0
    G1 Z2.0 F600                 ; Move Z Axis up to prevent scratching
    G1 X220 F9000                ; Move away from intro line

[gcode_macro END_PRINT]
gcode:
    # Get printer build volume dimensions
    {% set X_MAX = printer.toolhead.axis_maximum.x|default(100)|float %}
    {% set Y_MAX = printer.toolhead.axis_maximum.y|default(100)|float %}
    {% set Z_MAX = printer.toolhead.axis_maximum.z|default(100)|float %}
    {% set CURR_Z = printer.toolhead.position.z|float %}

    # Safe final Z height
    {% set SAFE_Z = CURR_Z + 10.0 %}
    {% if SAFE_Z > Z_MAX %}
        {% set SAFE_Z = Z_MAX %}
    {% endif %}

    # Relative positioning for retraction + wipe
    G91
    G1 E-2 F2700                 ; Initial retract
    G1 E-1.5 Z0.2 F2400          ; Extra retract + slight nozzle lift
    G1 X5 Y5 F12000              ; Fast wipe move
    G1 Z10 F1800                 ; Fast Z lift
    G90

    # Faster presentation / park move
    SET_VELOCITY_LIMIT ACCEL=40000
    G1 Z{SAFE_Z} F1800
    G1 X{X_MAX / 2} Y{Y_MAX - 5} F15000

    # Shutdown heaters and cooling
    M106 S0                      ; Part cooling fan off
    M104 S0                      ; Hotend off
    M140 S0                      ; Bed off

    # Clear skew correction
    SET_SKEW CLEAR=1

    # Disable selected steppers
    M84 X Y E

