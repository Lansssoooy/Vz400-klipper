[gcode_macro SERVO_MOVE]
description: "Move Euclid probe servo to a specified angle"
variable_ANGLE: 10
gcode:
    {% set new_angle = ANGLE|default(10)|int %}
    RESPOND MSG="Moving Euclid_servo to {new_angle}°"
    SET_SERVO SERVO=Euclid_servo ANGLE={new_angle}

[gcode_macro SERVO_OUT]
description: Deploy Euclid probe (servo to extended position)
gcode:
    RESPOND MSG="Deploying Euclid probe..."
    SET_SERVO SERVO=Euclid_servo ANGLE=125
    G4 P500                      ; Wait 500ms for servo to move

[gcode_macro SERVO_IN]
description: Stow Euclid probe (servo to retracted position)
gcode:
    RESPOND MSG="Stowing Euclid probe..."
    SET_SERVO SERVO=Euclid_servo ANGLE=10
    G4 P500                      ; Wait 500ms for servo to move

[gcode_macro SERVO_TEST]
description: Test servo movement - SERVO_TEST ANGLE=90
gcode:
    {% set test_angle = params.ANGLE|default(90)|int %}
    
    RESPOND MSG="Testing servo at {test_angle} degrees..."
    SET_SERVO SERVO=Euclid_servo ANGLE={test_angle}
    G4 P500
    SET_SERVO SERVO=Euclid_servo WIDTH=0.0  ; Disable PWM


